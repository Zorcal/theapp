syntax = "proto3";

package theapp.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

option go_package = "github.com/zorcal/theapp/backend/internal/api/grpc/internal/pb;pb";

import "protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "theapp User API"
    version: "v1"
  }
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Access token from VerifyMagicLink or RefreshAccessToken. Format: 'Bearer {token}'"
      }
    }
  }
  security: {
    security_requirement: {
      key: "BearerAuth"
      value: {}
    }
  }
};

// UserService provides operations for managing users.
service UserService {
  // Gets a user by ID.
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = {
      get: "/v1/users/{id}"
    };
  }

  // Lists users, optionally filtered and paginated.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/v1/users"
    };
  }

  // Creates a new user.
  rpc CreateUser(CreateUserRequest) returns (User) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }

  // Updates a user.
  rpc UpdateUser(UpdateUserRequest) returns (User) {
    option (google.api.http) = {
      patch: "/v1/users/{user.id}"
      body: "*"
    };
  }
}

// User represents a user in the system.
message User {
  // Unique identifier for the user. Output only.
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY, (google.api.field_info).format = UUID4];

  // Email address of the user.
  string email = 3;

  // Timestamp when the user was created. Output only.
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Timestamp when the user was last updated. Output only.
  google.protobuf.Timestamp update_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Timestamp when the user's email address was verified. Null until the user
  // completes their first magic-link sign-in. Output only.
  google.protobuf.Timestamp email_verified_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Name of the user (first and last name).
  string name = 7;

  // The ETag for the current version of the user. Helps to prevent
  // simultaneous updates of a user from overwriting each other ("mid-air
  // collisions").
  //
  // If this is provided on update, it must match the server's ETag.
  string etag = 6 [(google.api.field_behavior) = OUTPUT_ONLY, (google.api.field_info).format = UUID4];
}

// Request message for getting a user by ID.
message GetUserRequest {
  // The ID of the user to retrieve.
  string id = 1 [(google.api.field_behavior) = REQUIRED, (google.api.field_info).format = UUID4];
}

// Request message for updating a user.
message UpdateUserRequest {
  // The user to update. The user's `id` identifies which user to update.
  User user = 1 [(google.api.field_behavior) = REQUIRED];

  // The list of fields to update. When omitted, all populated fields are updated.
  google.protobuf.FieldMask update_mask = 2;
}

// Request message for creating a user.
message CreateUserRequest {
  // The user to create.
  User user = 1 [(google.api.field_behavior) = REQUIRED];
}

// UserFilter specifies criteria for filtering users in a ListUsers request.
// This is a typed filter — a deliberate deviation from AIP-160 to avoid the
// complexity of a free-form filter parser; see schemas/README.md.
// All fields are optional; omitted fields match all users.
message UserFilter {
  // Match users whose email starts with this prefix.
  string email = 1;

  // Match users whose name starts with this prefix.
  string name = 2;
}

// Request message for listing users.
message ListUsersRequest {
  // Maximum number of users to return.
  int32 page_size = 1;

  // Token for fetching the next page of results.
  string page_token = 2;

  // Field to order the results by, e.g., "create_time" or "update_time".
  string order_by = 3;

  // Filter criteria. All fields are optional; omitted fields match all users.
  UserFilter filter = 4;
}

// Response message for listing users.
message ListUsersResponse {
  // List of users returned in the response.
  repeated User users = 1;

  // Total number of users in the system.
  int32 total_size = 2;

  // Token for fetching the next page of results, if applicable.
  string next_page_token = 3;
}
