receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: "local"
        action: insert

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Loki 3.x ingests OTLP natively at /otlp/v1/logs.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  # Mimir ingests OTLP natively at /otlp/v1/metrics.
  otlphttp/mimir:
    endpoint: http://mimir:9009/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/mimir]

  extensions: []
  telemetry:
    logs:
      level: "info"
